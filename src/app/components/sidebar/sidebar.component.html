<div class="sidebar">
  <div class="sidebar-header">
    <h2>ERP</h2>
  </div>

  <nav class="sidebar-nav">
    <ng-container *ifHasPermission="'dashboard.view'">
      <a routerLink="/app/dashboard" routerLinkActive="active">
        <i class="pi pi-home"></i> Inicio
      </a>
    </ng-container>

    <ng-container *ifHasPermission="'grupos.view'">
      <a routerLink="/app/grupos" routerLinkActive="active"> <i class="pi pi-users"></i> Grupos </a>
    </ng-container>

    <ng-container *ifHasPermission="'usuario.view'">
      <a routerLink="/app/usuario" routerLinkActive="active">
        <i class="pi pi-id-card"></i> Perfil
      </a>
    </ng-container>

    <ng-container *ifHasPermission="'permisos.view'">
  <a routerLink="/app/permisos" routerLinkActive="active">
    <i class="pi pi-shield"></i> Permisos
  </a>
</ng-container>

    <ng-container *ifHasPermission="'mipanel.view'">
      <a routerLink="/app/mi-panel" routerLinkActive="active">
        <i class="pi pi-home"></i> Mi Panel
      </a>
    </ng-container>
  </nav>

  <div class="sidebar-footer">
    <a (click)="cerrarSesion()" style="cursor: pointer">
      <i class="pi pi-sign-out"></i> Cerrar sesión
    </a>
    <span class="version">v1.0.0</span>
  </div>
</div>
